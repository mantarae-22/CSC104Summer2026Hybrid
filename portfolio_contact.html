<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Rae</title>

    <!-- link to the external CSS file -->
    <link rel="stylesheet" href="portfolio.css">
</head>
<body>
    <!-- header - menu, logo, page title -->
    <header>
        <!-- good way to organize the website menu -->
        <nav>
            <ul>
                <li><a href="portfolio_index.html">Home</a></li>
                <li><a href="portfolio_projects.html">Projects</a></li>
                <li><a href="portfolio_contact.html">Contact</a></li>
            </ul>
        </nav>

        <!-- page title -->
         <h1>Contact Rae</h1>
    </header>

    <main>
        <!-- the final project needs a form or table, a contact form is one way to meet that requirement -->
        <form>
            <div>
                <label for="txtName">Your Name: </label>
                <input type="text" id="txtName" name="txtName" placeholder="Your Name">
            </div>   

            <div>
                <label for="emlUser">Email: </label>
                <input type="email" id="emlUser" name="emlUser" placeholder="YourName@domain.com">
            </div>

            <div>
                <label for="txtaComments">Your Message:</label>
                <textarea id="txtaComments" name="txtaComments" rows="10" cols="40"></textarea>
            </div>
        </form>

        <table>
            <caption>Contact Me</caption>
            <tr>
                <th>Type</th>
                <th>Value</th>
            </tr>
            <tr>
                <td>Phone</td>
                <td>555-1212</td>
            </tr>
            <tr>
                <td>Email</td>
                <td>me@me.com</td>
            </tr>
        </table>
    </main>
</body>
</html>
